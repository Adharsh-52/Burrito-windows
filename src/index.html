<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Burrito Optimizer</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Inter, system-ui;
    }

    body {
      margin: 0;
      background: #0b0b0c;
      color: #e5e5e5;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      background: #1f1f23;
      border: 1px solid #2a2a2f;
      padding: 10px 14px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2a2a30;
    }

    .progress {
      background: #1a1a1d;
      border-radius: 8px;
      overflow: hidden;
      height: 8px;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      background: #4f46e5;
      width: 0%;
      transition: width 0.2s ease;
    }

    .status {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .card {
      background: #111113;
      border: 1px solid #232326;
      border-radius: 10px;
      padding: 8px;
    }

    .card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
    }

    .meta {
      font-size: 11px;
      margin-top: 6px;
      color: #888;
    }

    .success {
      color: #22c55e;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Burrito Optimizer</h1>
  <div class="sub">Fast, local image compression (PNG / WebP)</div>

  <div class="actions">
    <button onclick="pickFiles()">Select Images</button>
  </div>

  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <div id="status" class="status">Idle</div>

  <div id="grid" class="grid"></div>

</div>

<script src="./renderer.js"></script>
</body>
</html>
